<!DOCTYPE html>
<html lang="en" data-theme="soft">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News — Belgium Economic Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ═══ DAY — clean white ═══ */
        [data-theme="day"] {
          --bg-page:#f7f7f5; --bg-header:linear-gradient(135deg,#1e3a5f,#2a5080); --bg-header-text:#fff;
          --text-cell:#1e293b; --text-muted:#94a3b8; --gold:#b58a2a;
          --bg-card:#fff; --border-card:#e5e7eb;
        }
        /* ═══ SOFT — warm muted ═══ */
        [data-theme="soft"] {
          --bg-page:#f5f0ea; --bg-header:linear-gradient(135deg,#3b3228,#5a4a3a); --bg-header-text:#f5f0ea;
          --text-cell:#3b3228; --text-muted:#a39888; --gold:#c49a3c;
          --bg-card:#faf6f0; --border-card:#ddd5c8;
        }
        /* ═══ NIGHT — deep blue ═══ */
        [data-theme="night"] {
          --bg-page:#0c1220; --bg-header:linear-gradient(135deg,#0a0f1c,#131d33); --bg-header-text:#e8ecf2;
          --text-cell:#c8d2de; --text-muted:#3d5068; --gold:#d4a843;
          --bg-card:#0f1826; --border-card:#1a2744;
        }

        body { font-family: 'Figtree', sans-serif; background: var(--bg-page); color: var(--text-cell); margin: 0; padding: 40px; transition: background 0.3s, color 0.3s; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; font-weight: 700; color: var(--gold); }
        .subtitle { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 40px; }
        .news-card { background: var(--bg-card); border: 1px solid var(--border-card); padding: 30px; border-radius: 20px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .news-item { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border-card); }
        .news-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .news-title { font-weight: 600; font-size: 1.2rem; margin-bottom: 5px; }
        .news-date { font-size: 0.8rem; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="page-title">Economic News</h1>
        <p class="subtitle" id="page-subtitle">Latest updates from the Belgian economy</p>
        
        <div class="news-card">
            <div id="news-content">
                <div class="news-item">
                    <div class="news-title">NBB releases Autumn macroeconomic projections</div>
                    <div class="news-date">March 2, 2026</div>
                </div>
                <div class="news-item">
                    <div class="news-title">Belgium's public debt trajectory remains under focus</div>
                    <div class="news-date">February 28, 2026</div>
                </div>
                <div class="news-item">
                    <div class="news-title">Consumer confidence shows slight improvement in early Q1</div>
                    <div class="news-date">February 25, 2026</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const translations = {
            en: {
                title: "Economic News",
                subtitle: "Latest updates from the Belgian economy",
                items: [
                    "NBB releases Autumn macroeconomic projections",
                    "Belgium's public debt trajectory remains under focus",
                    "Consumer confidence shows slight improvement in early Q1"
                ]
            },
            fr: {
                title: "Actualités Économiques",
                subtitle: "Dernières mises à jour de l'économie belge",
                items: [
                    "La BNB publie ses projections macroéconomiques d'automne",
                    "La trajectoire de la dette publique belge reste sous surveillance",
                    "La confiance des consommateurs s'améliore légèrement début T1"
                ]
            },
            nl: {
                title: "Economisch Nieuws",
                subtitle: "Laatste updates van de Belgische economie",
                items: [
                    "NBB publiceert herfst-macro-economische prognoses",
                    "Belgiës staatsschuldtraject blijft onder de aandacht",
                    "Consumentenvertrouwen toont lichte verbetering in begin Q1"
                ]
            }
        };

        function setTheme(t) {
            document.documentElement.setAttribute('data-theme', t);
        }

        function setLang(l) {
            const t = translations[l] || translations.en;
            document.getElementById('page-title').textContent = t.title;
            document.getElementById('page-subtitle').textContent = t.subtitle;
            
            const newsItems = document.querySelectorAll('.news-item .news-title');
            newsItems.forEach((item, idx) => {
                if (t.items[idx]) item.textContent = t.items[idx];
            });
        }

        window.addEventListener('message', function(e) {
            if (e.data.type === 'setTheme') {
                setTheme(e.data.value);
            } else if (e.data.type === 'setLang') {
                setLang(e.data.value);
            }
        });

        // Notify parent we are ready
        document.addEventListener('DOMContentLoaded', () => {
            if (window.self !== window.top) {
                window.parent.postMessage('dashboard-ready', '*');
            }
        });
    </script>
</body>
</html>
