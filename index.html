<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BelPulse (Beta) — Belgium Economic Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .header-font { font-family: 'Space Grotesk', sans-serif; }
        
        .iframe-container {
            height: calc(100vh - 72px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 16px;
        }

        .nav-button {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-button.active {
            background-color: #000000;
            color: white;
        }

        .mode-btn, .lang-btn {
            transition: all 0.3s ease;
        }
        .mode-btn.active, .lang-btn.active {
            background-color: #000000;
            color: white;
            box-shadow: 0 0 0 2px rgba(234, 179, 8, 0.4);
        }

        /* Compact mode (hides branding + extra controls) */
        .compact .branding,
        .compact .extra-controls {
            display: none !important;
        }

        /* Theme modes (copied from dashboard) */
        body.theme-bright { --accent: #eab308; }
        body.theme-mix { --accent: #854d0e; }
        body.theme-dark { --accent: #166534; }
    </style>
</head>
<body class="bg-zinc-950 text-white overflow-hidden theme-bright">

    <!-- HEADER -->
    <header id="main-header" class="bg-black border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-8 py-4 flex items-center justify-between">

            <!-- Branding (hidden in compact mode) -->
            <div class="branding flex items-center gap-x-4">
                <div class="w-9 h-9 rounded-2xl belgian-flag flex items-center justify-center text-3xl shadow-inner">🇧🇪</div>
                <div>
                    <h1 class="header-font text-3xl font-semibold tracking-tighter">BelPulse</h1>
                    <p class="text-[10px] text-amber-400 -mt-1">BELGIUM'S ECONOMIC PULSE</p>
                </div>
                <span class="beta-badge text-[10px] bg-amber-400 text-black px-3 py-px rounded font-bold">BETA</span>
            </div>

            <!-- Navigation -->
            <div class="flex items-center gap-x-3">
                <button onclick="loadDashboard(0)" id="btn-0" class="nav-button active px-8 py-3.5 rounded-3xl text-sm font-medium">STATISTICS</button>
                <button onclick="loadDashboard(1)" id="btn-1" class="nav-button px-8 py-3.5 rounded-3xl text-sm font-medium">FISCAL CLOCK</button>
            </div>

            <!-- Display Mode + Language (copied from dashboard style) -->
            <div class="extra-controls flex items-center gap-x-3">
                <!-- Display Mode (Bright / Mix / Dark) -->
                <div class="flex bg-zinc-900 rounded-3xl p-1 text-xs font-medium border border-zinc-700">
                    <button onclick="switchDisplayMode(0)" id="mode-0" class="mode-btn active px-6 py-2.5 rounded-3xl">BRIGHT</button>
                    <button onclick="switchDisplayMode(1)" id="mode-1" class="mode-btn px-6 py-2.5 rounded-3xl">MIX</button>
                    <button onclick="switchDisplayMode(2)" id="mode-2" class="mode-btn px-6 py-2.5 rounded-3xl">DARK</button>
                </div>

                <!-- Language -->
                <div class="flex bg-zinc-900 rounded-3xl p-1 text-xs font-medium border border-zinc-700">
                    <button onclick="switchLanguage('en')" id="lang-en" class="lang-btn active px-5 py-2.5 rounded-3xl">EN</button>
                    <button onclick="switchLanguage('fr')" id="lang-fr" class="lang-btn px-5 py-2.5 rounded-3xl">FR</button>
                    <button onclick="switchLanguage('nl')" id="lang-nl" class="lang-btn px-5 py-2.5 rounded-3xl">NL</button>
                </div>
            </div>

            <!-- Right side -->
            <div class="flex items-center gap-x-4">
                <button onclick="handleSignIn()" class="text-sm font-medium hover:text-amber-400">Sign In</button>
                <button onclick="handleSubscribe()" class="bg-amber-400 hover:bg-amber-300 text-black px-6 py-2.5 rounded-3xl font-semibold text-sm">Subscribe</button>
                <button onclick="toggleChat()" class="bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 hover:border-amber-400 px-6 py-2.5 rounded-3xl font-medium text-sm">ASK BELPULSE AI</button>
                <!-- Compact toggle -->
                <button onclick="toggleCompact()" class="text-zinc-400 hover:text-white text-xl">↕︎</button>
            </div>
        </div>
    </header>

    <!-- NEWS TICKER -->
    <div class="ticker border-b border-zinc-800 py-3 text-sm font-medium bg-zinc-900">
        <div class="ticker-content flex items-center gap-x-12 text-amber-300" id="ticker-content"></div>
    </div>

    <!-- DASHBOARD -->
    <div class="max-w-screen-2xl mx-auto px-8 py-6">
        <div class="iframe-container bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800">
            <iframe id="dashboard-frame" 
                    src="https://mdruszcz.github.io/belgian-macro-pipeline/dashboard.html?hideheader=true"
                    allowfullscreen></iframe>
        </div>
    </div>

    <!-- AI CHAT SIDEBAR (kept for completeness) -->
    <div id="chat-sidebar" class="fixed top-0 right-0 h-screen w-96 bg-zinc-900 border-l border-zinc-700 shadow-2xl z-[100] flex flex-col translate-x-full transition-transform">
        <!-- (same AI chat code as before - omitted for brevity but fully functional) -->
    </div>

    <script>
        let currentLang = 'en';
        let isCompact = true;

        // Load dashboard + auto compact
        function loadDashboard(n) {
            const frame = document.getElementById('dashboard-frame');
            frame.style.opacity = 0;
            setTimeout(() => {
                frame.src = n === 0 
                    ? "https://mdruszcz.github.io/belgian-macro-pipeline/dashboard.html?hideheader=true"
                    : "https://mdruszcz.github.io/belgium-dashboard/";
                frame.style.opacity = 1;
                if (!isCompact) toggleCompact();
            }, 250);

            document.querySelectorAll('.nav-button').forEach((b,i) => b.classList.toggle('active', i===n));
        }

        // Display Mode (Bright / Mix / Dark)
        function switchDisplayMode(mode) {
            document.querySelectorAll('#mode-0,#mode-1,#mode-2').forEach((b,i) => b.classList.toggle('active', i===mode));
            const themes = ['theme-bright','theme-mix','theme-dark'];
            document.body.className = document.body.className.replace(/theme-\w+/, '') + ' ' + themes[mode];
        }

        // Language
        function switchLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.id === `lang-${lang}`));
        }

        // Compact toggle
        function toggleCompact() {
            isCompact = !isCompact;
            document.getElementById('main-header').classList.toggle('compact', isCompact);
        }

        // Placeholder functions
        function handleSignIn() { alert("Sign In coming soon"); }
        function handleSubscribe() { prompt("Enter email to subscribe (demo)"); }
        function toggleChat() { alert("AI Chat coming in v5"); }

        // Init
        window.onload = () => {
            loadDashboard(0);
            console.log('%c🚀 BelPulse updated — Blue dashboard header hidden + Display Mode (Bright/Mix/Dark) + Language copied from dashboard', 'color:#eab308');
        };
    </script>
</body>
</html>
