<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BelPulse (Beta) — Belgium Economic Intelligence</title>
    
    <script>
      (function() {
        const t = localStorage.getItem("theme") || "soft";
        document.documentElement.setAttribute('data-theme', t);
        const l = localStorage.getItem("lang") || "en";
        document.documentElement.lang = l;
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Overpass+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* ═══ DAY ═══ */
        [data-theme="day"] {
          --bg-page:#ffffff; --bg-header:#ffffff; --bg-header-text:#000000;
          --bg-header-sub:rgba(0,0,0,.55); --bg-header-right:rgba(0,0,0,.6); --gold:#991b1b;
          --bg-controls:#f3f4f6; --border-controls:#e5e7eb; --text-status:#374151;
          --bg-btn:#ffffff; --text-btn:#000000; --border-btn:#e5e7eb; --bg-btn-hover:#f9fafb;
          --bg-btn-primary:#000000; --text-btn-primary:#ffffff;
          --bg-pill:#ffffff; --text-pill:#374151; --border-pill:#e5e7eb; --bg-pill-active:#000000; --text-pill-active:#ffffff;
          --text-section:#000000; --border-section:#000000;
          --text-cell:#000000; --text-cell-muted:#374151; --text-cell-dim:#4b5563;
        }
        /* ═══ SOFT ═══ */
        [data-theme="soft"] {
          --bg-page:#fdf4ef; --bg-header:#fdf4ef; --bg-header-text:#111827;
          --bg-header-sub:rgba(17,24,39,.5); --bg-header-right:rgba(17,24,39,.55); --gold:#800020;
          --bg-controls:#f5e9e2; --border-controls:rgba(0, 0, 0, 0.15); --text-status:#4b5563;
          --bg-btn:#f5e9e2; --text-btn:#111827; --border-btn:rgba(0, 0, 0, 0.1); --bg-btn-hover:#efe3db;
          --bg-btn-primary:#1f2937; --text-btn-primary:#ffffff;
          --bg-pill:#f5e9e2; --text-pill:#4b5563; --border-pill:rgba(0, 0, 0, 0.1); --bg-pill-active:#1f2937; --text-pill-active:#ffffff;
          --text-section:#111827; --border-section:#111827;
          --text-cell:#111827; --text-cell-muted:#4b5563; --text-cell-dim:#6b7280;
        }
        /* ═══ NIGHT ═══ */
        [data-theme="night"] {
          --bg-page:#0f172a; --bg-header:#0f172a; --bg-header-text:#f8fafc;
          --bg-header-sub:rgba(248,250,252,.45); --bg-header-right:rgba(148,163,184,.8); --gold:#f87171;
          --bg-controls:#1e293b; --border-controls:#334155; --text-status:#94a3b8;
          --bg-btn:#1e293b; --text-btn:#f8fafc; --border-btn:#334155; --bg-btn-hover:#2d3748;
          --bg-btn-primary:#334155; --text-btn-primary:#f8fafc;
          --bg-pill:#1e293b; --text-pill:#94a3b8; --border-pill:#334155; --bg-pill-active:#334155; --text-pill-active:#f8fafc;
          --text-section:#f8fafc; --border-section:#334155;
          --text-cell:#f8fafc; --text-cell-muted:#94a3b8; --text-cell-dim:#64748b;
        }

        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg-page); color: var(--text-cell); transition: background 0.3s, color 0.3s; }
       .header-font { font-family: 'Playfair Display', serif; font-weight: 700; }
        
       .iframe-container {
            height: calc(100vh - 166px); /* Exact height between menu and footer */
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
       .nav-button { transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1); border: none; background: transparent; color: var(--text-cell-muted); font-weight: 500; }
       .nav-button:hover { color: var(--text-cell); }
       .nav-button.active {
            background: transparent;
            color: var(--text-cell);
            border: none;
            font-weight: 700;
            text-decoration: underline;
            text-underline-offset: 4px;
        }
        
       .belgian-flag {
            background: linear-gradient(to right, #000000 33.33%, #FFCC00 33.33%, #FFCC00 66.66%, #C8102E 66.66%);
        }
        
        .ecg-line {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: dash 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
        }
        
        @keyframes dash {
            0% { stroke-dashoffset: 100; opacity: 0; }
            10% { opacity: 1; }
            80% { stroke-dashoffset: 0; opacity: 1; }
            100% { stroke-dashoffset: 0; opacity: 0; }
        }

        /* SUB-MENU */
       .sub-menu { background: var(--bg-controls); border-bottom: 1px solid var(--border-controls); color: var(--text-cell); }


        /* BETA BADGE */
       .beta-badge { font-size: 10px; letter-spacing: 1px; background: var(--gold); color: white; padding: 1px 6px; border-radius: 9999px; font-weight: 700; position: relative; top: -15px; margin-left: -5px; }

        /* STOCK TICKER FOOTER */
       .stock-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: var(--bg-controls);
            border-top: 1px solid var(--border-controls);
            z-index: 40;
            display: flex;
            align-items: center;
            overflow: hidden;
            font-family: 'Overpass Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-cell);
        }
       .stock-ticker-wrapper {
            white-space: nowrap;
            display: flex;
            animation: stock-ticker-slide 20s linear infinite;
        }
        @keyframes stock-ticker-slide {
            from { transform: translateX(100vw); }
            to { transform: translateX(-100%); }
        }
       .stock-item {
            display: flex;
            align-items: center;
            padding: 0 40px;
            gap: 10px;
        }
       .stock-label { font-weight: 600; color: var(--text-cell-dim); }
       .stock-value { font-weight: 700; }
       .stock-up { color: #10b981; }
       .stock-down { color: #ef4444; }

        /* DROPDOWNS MATCHING DASHBOARD */
       .dd-wrap{position:relative;height:28px}
       .dd-wrap.theme,.dd-wrap.lang{width:42px}
       .theme-switcher,.lang-switch{display:flex;flex-direction:column;gap:2px;background:rgba(255,255,255,.1);border-radius:8px;padding:3px;position:absolute;top:0;left:0;right:0;z-index:100;transition:background .2s,box-shadow .2s}
       .dd-wrap:hover .theme-switcher,.dd-wrap:hover .lang-switch{background:var(--bg-page);box-shadow:0 4px 12px rgba(0,0,0,.25)}
       .theme-btn,.lang-btn{font-family:'Inter';border-radius:6px;border:none;cursor:pointer;background:transparent;color:var(--bg-header-text);transition:all .15s;text-align:center;display:none;order:2;padding:4px 0;width:100%;height:28px;line-height:20px}
       .theme-btn{font-size:.85rem}
       .lang-btn{font-size:.7rem;font-weight:700}
       .theme-btn.active,.lang-btn.active{display:block;order:1;opacity:1;background:var(--bg-page);color:var(--text-section);box-shadow:0 2px 4px rgba(0,0,0,.1)}
       .dd-wrap:hover .theme-btn,.dd-wrap:hover .lang-btn{display:block;color:var(--text-section);opacity:.7}
       .dd-wrap:hover .theme-btn.active,.dd-wrap:hover .lang-btn.active{box-shadow:none;background:transparent;opacity:1}
        .dd-wrap:hover .theme-btn:hover,.dd-wrap:hover .lang-btn:hover{background:rgba(128,128,128,.15);opacity:1}
    </style>
</head>

<body class="page-index overflow-hidden">

    <header class="sticky top-0 z-50 border-b" style="background: var(--bg-page); border-color: var(--border-controls);">
        <div class="max-w-screen-2xl mx-auto px-8 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-4" aria-label="Belpulse Beta">
                <div class="w-10 h-10 rounded-2xl belgian-flag flex items-center justify-center shadow-inner overflow-hidden">
                    <svg class="w-7 h-7 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path class="ecg-line" d="M2 12h3l2.5-6 5 12 2.5-6h3" />
                    </svg>
                </div>
                <div>
                    <div class="flex items-baseline gap-x-3">
                        <h1 class="header-font text-4xl font-semibold tracking-tighter" style="color: var(--bg-header-text)">BelPulse</h1>
                        <span class="beta-badge">BETA</span>
                    </div>
                    <p id="subtitle" class="text-[10px] tracking-[2px] -mt-1" style="color: var(--gold)">BELGIUM'S ECONOMIC PULSE</p>
                </div>
            </div>

            <div id="main-nav-buttons" class="hidden md:flex items-center gap-x-3">
                <!-- Buttons moved to sub-menu -->
            </div>

            <div class="flex items-center gap-x-6">
                <!-- CUSTOM DROPDOWNS FROM DASHBOARD -->
                <div class="dd-wrap theme">
                    <div class="theme-switcher">
                        <button class="theme-btn" id="t-day" onclick="setTheme('day')">☀</button>
                        <button class="theme-btn" id="t-soft" onclick="setTheme('soft')">◑</button>
                        <button class="theme-btn" id="t-night" onclick="setTheme('night')">☾</button>
                    </div>
                </div>

                <div class="dd-wrap lang">
                    <div class="lang-switch">
                        <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
                        <button class="lang-btn" id="btn-fr" onclick="setLang('fr')">FR</button>
                        <button class="lang-btn" id="btn-nl" onclick="setLang('nl')">NL</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <nav class="sub-menu py-1 text-sm font-medium sticky top-[81px] z-40">
        <div class="w-full px-8 flex items-center gap-x-4">
            <button onclick="loadDashboard(2)" id="btn-2"
                    class="nav-button px-2 py-1 transition-all flex items-center">
                <span id="menu-news">NEWS</span>
            </button>

            <button onclick="loadDashboard(3)" id="btn-3"
                    class="nav-button px-2 py-1 transition-all flex items-center">
                <span id="menu-analysis">ANALYSIS</span>
            </button>

            <div class="w-px h-4 bg-gray-500/20 mx-1"></div>

            <button onclick="loadDashboard(0)" id="btn-0"
                    class="nav-button active px-2 py-1 transition-all flex items-center">
                <span id="menu-stats">STATISTICS</span>
            </button>
            
            <button onclick="loadDashboard(1)" id="btn-1"
                    class="nav-button px-2 py-1 transition-all flex items-center">
                <span id="menu-clock">CLOCK</span>
            </button>

            <button onclick="loadDashboard(4)" id="btn-4"
                    class="nav-button px-2 py-1 transition-all flex items-center">
                <span id="menu-about">ABOUT US</span>
            </button>
        </div>
    </nav>

    <div class="w-full h-full">
        <div class="iframe-container overflow-hidden" style="background: var(--bg-controls);">
            <iframe id="dashboard-frame" 
                    src="dashboard.html"
                    allowfullscreen></iframe>
        </div>
    </div>

    <footer class="stock-footer">
        <div class="stock-ticker-wrapper" id="stock-ticker-content">
            <!-- Items will be populated by JS -->
        </div>
    </footer>

    <script>
        // === SYNC SYSTEM ===
        function syncDashboard() {
            const frame = document.getElementById('dashboard-frame');
            if (frame && frame.contentWindow) {
                frame.contentWindow.postMessage({ type: 'setTheme', value: document.documentElement.getAttribute('data-theme') }, '*');
                frame.contentWindow.postMessage({ type: 'setLang', value: currentLang }, '*');
            }
        }

        function setTheme(t) {
            document.documentElement.setAttribute('data-theme', t);
            localStorage.setItem('theme', t);
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
            const btn = document.getElementById('t-' + t);
            if (btn) btn.classList.add('active');
            syncDashboard();
        }

        function setLang(l) {
            if (currentLang === l && document.getElementById('btn-' + l).classList.contains('active')) return;
            currentLang = l;
            localStorage.setItem('lang', l);
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            const btn = document.getElementById('btn-' + l);
            if (btn) btn.classList.add('active');
            
            // Update UI translations
            document.getElementById('subtitle').textContent = translations[l].subtitle;

            // Update Menu
            document.getElementById('menu-stats').textContent = translations[l].menuStats;
            document.getElementById('menu-clock').textContent = translations[l].menuClock;
            document.getElementById('menu-news').textContent = translations[l].menuNews;
            document.getElementById('menu-analysis').textContent = translations[l].menuAnalysis;
            document.getElementById('menu-about').textContent = translations[l].menuAbout;

            syncDashboard();
        }

        // === LANGUAGE SYSTEM ===
        let currentLang = 'en';

        const translations = {
            en: {
                subtitle: "BELGIUM'S ECONOMIC PULSE",
                menuStats: "STATISTICS",
                menuClock: "CLOCK",
                menuNews: "NEWS",
                menuAnalysis: "ANALYSIS",
                menuAbout: "ABOUT US"
            },
            fr: {
                subtitle: "LE POULS ÉCONOMIQUE DE LA BELGIQUE",
                menuStats: "STATISTIQUES",
                menuClock: "HORLOGE",
                menuNews: "NOUVELLES",
                menuAnalysis: "ANALYSE",
                menuAbout: "À PROPOS"
            },
            nl: {
                subtitle: "BELGIË'S ECONOMISCHE PULS",
                menuStats: "STATISTIEKEN",
                menuClock: "KLOK",
                menuNews: "NIEUWS",
                menuAnalysis: "ANALYSE",
                menuAbout: "OVER ONS"
            }
        };

        // === DASHBOARD SWITCHING ===
        const dashboards = [
            "dashboard.html",
            "clock.html",
            "news.html",
            "analysis.html",
            "about.html"
        ];

        function loadDashboard(index) {
            const frame = document.getElementById('dashboard-frame');
            frame.style.opacity = 0;
            setTimeout(() => {
                frame.src = dashboards[index];
                frame.style.opacity = 1;
                // Give it a moment to load then sync
                setTimeout(syncDashboard, 500);
            }, 300);
            
            // Remove active class from all nav buttons
            document.querySelectorAll('.nav-button').forEach(btn => btn.classList.remove('active'));
            
            // Add active class to the correct button based on ID
            const activeBtn = document.getElementById('btn-' + index);
            if (activeBtn) activeBtn.classList.add('active');
        }


        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.key === "1") loadDashboard(2); // News
            if (e.key === "2") loadDashboard(3); // Analysis
            if (e.key === "3") loadDashboard(0); // Stats
            if (e.key === "4") loadDashboard(1); // Clock
            if (e.key === "5") loadDashboard(4); // About
        });

        // Init everything
        window.onload = function() {
            // Default to News (index 2)
            loadDashboard(2);
            const savedLang = localStorage.getItem("lang") || 'en';
            const savedTheme = localStorage.getItem("theme") || 'soft';
            
            // Set initial state without triggering sync yet
            currentLang = savedLang;
            document.documentElement.setAttribute('data-theme', savedTheme);
            
            // Update active buttons
            const themeBtn = document.getElementById('t-' + savedTheme);
            if (themeBtn) themeBtn.classList.add('active');
            const langBtn = document.getElementById('btn-' + savedLang);
            if (langBtn) langBtn.classList.add('active');

            // Apply translations
            document.getElementById('subtitle').textContent = translations[savedLang].subtitle;
            
            document.getElementById('menu-stats').textContent = translations[savedLang].menuStats;
            document.getElementById('menu-clock').textContent = translations[savedLang].menuClock;
            document.getElementById('menu-news').textContent = translations[savedLang].menuNews;
            document.getElementById('menu-analysis').textContent = translations[savedLang].menuAnalysis;
            document.getElementById('menu-about').textContent = translations[savedLang].menuAbout;
            
            // Sync with iframe after a short delay
            setTimeout(syncDashboard, 1000);

            console.log('%c🚀 BelPulse (Beta) ready — Shared Dashboard Styles & Sync live!', 
                        'color:#c49a3c; font-family:monospace; font-size:11px');
        };

        // === STOCK DATA FETCHING ===
        let stockResults = {};

        async function fetchStockData() {
            try {
                const response = await fetch('data/stocks.json');
                if (!response.ok) throw new Error('Could not load stock data');
                stockResults = await response.json();
                updateStockTicker();
            } catch (e) {
                console.error("Error loading stocks.json:", e);
            }
        }

        function updateStockTicker() {
            const container = document.getElementById('stock-ticker-content');
            if (!container || !stockResults) return;

            const keys = Object.keys(stockResults);
            const content = keys.map(key => {
                const s = stockResults[key];
                const sign = s.change >= 0 ? '▲' : '▼';
                const colorClass = s.change >= 0 ? 'stock-up' : 'stock-down';
                let formattedPrice;
                if(s.currency === 'USD') formattedPrice = `$${s.price.toFixed(4)}`;
                else if(s.currency === '%') formattedPrice = `${s.price.toFixed(2)}%`;
                else formattedPrice = `${s.price.toFixed(2)}€`;
                
                return `
                    <div class="stock-item">
                        <span class="stock-label">${s.name} (${s.ticker})</span>
                        <span class="stock-value ${colorClass}">${formattedPrice} ${sign} (${s.change.toFixed(2)}%)</span>
                    </div>
                `;
            }).join('');

            container.innerHTML = content;
            
            // Speed control: total passing time (increased by 30% for slower scroll)
            const duration = Math.max(60, Math.floor(keys.length * 6));
            container.style.animationDuration = `${duration}s`;
        }

        // Listen for iframe ready message if any
        window.addEventListener('message', function(e) {
            if (e.data === 'dashboard-ready') {
                syncDashboard();
            }
        });

        // Initialize stock data fetching
        fetchStockData();
        // Refresh every 5 minutes
        setInterval(fetchStockData, 300000);
    </script>
</body>
</html>
